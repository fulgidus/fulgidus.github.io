name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  # Replace `main` with your branch name if it's different
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Bun
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Step 3: Install Playwright Chromium for Marp PDF export
      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      # Step 4: Run tests before building
      - name: Testing
        run: bun run test

      # Step 5: Build the site
      - name: Build site
        run: bun run build

      # Step 6: Lighthouse CI audit
      # Runs against built dist/ files before deployment.
      # Only a11y and SEO regressions block deployment (see lighthouserc.js).
      - name: Lighthouse CI audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true

      # Step 7: Upload Lighthouse reports as build artifacts
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14

      # Step 8: Upload build artifact for Pages deployment
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  Deploy:
    # Deploy job depends on the build job
    needs: Build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:

      # Step 2: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
