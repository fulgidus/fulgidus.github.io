        title: "Audit all external resources for CSP whitelist"
        description: >
          Identify every external resource loaded by the site: scripts, styles,
          fonts, iframes, images, connections. Build a complete whitelist for
          the CSP. Known externals: giscus.app (iframe + script), Umami
