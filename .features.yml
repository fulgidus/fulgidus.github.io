  # ---------------------------------------------------------------------------
  # FEATURE 5: i18n architecture overhaul
  # ---------------------------------------------------------------------------
  - id: i18n-overhaul
    title: "Redo i18n for easier language management"
    description: >
      Redesign the internationalization system to solve three pain points:
      (1) Easier jumping between language versions of the same page/post,
      (2) Ability to share static resources (cover images, assets) across
      language versions of a post without duplication, and (3) Eliminate the
      /it/ folder duplication pattern in src/pages/ and src/content/ that
      mirrors the entire English structure. The current system is a hand-rolled
      solution because Astro's built-in i18n "breaks the site for some reason"
      (noted in astro.config.ts). The new system should be cleaner while
      remaining compatible with Astro's static output for GitHub Pages.
    status: backlog
    completion: 0
    difficulty: very_hard
    priority: high
    effort: "P5D"
    started_at: null
    ended_at: null
    constraints:
      - "Must remain fully static (GitHub Pages deployment)"
      - "Must not break existing URLs - implement redirects if paths change"
