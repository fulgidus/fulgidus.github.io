          - "Must handle URLs without a language prefix (default to English)"
          - "Must match the same language prefix list as src/i18n/ui.ts"
        forbidden:
          - "Do not use navigator.language as primary detection — URL path takes precedence"
        references:
          - "src/i18n/utils.ts"
        notes: []
        subtasks: []

      - id: 404-embed-translations
        title: "Embed all language strings in the 404 page"
