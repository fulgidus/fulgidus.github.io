          window.location.pathname to detect the language prefix (e.g. /it/).
          This must run immediately on page load and determine which language's
          strings to display. The detection logic should mirror getLangFromUrl
          from src/i18n/utils.ts but run in the browser.
        status: backlog
        completion: 0
        difficulty: medium
        priority: high
        effort: "PT2H"
        started_at: null
        ended_at: null
        constraints:
          - "Must not cause layout shift — either hide terminal until language is resolved, or render with data attributes and swap text in place"
          - "Must handle URLs without a language prefix (default to English)"
          - "Must match the same language prefix list as src/i18n/ui.ts"
        forbidden:
          - "Do not use navigator.language as primary detection — URL path takes precedence"
        references:
          - "src/i18n/utils.ts"
        notes: []
        subtasks: []

      - id: 404-embed-translations
        title: "Embed all language strings in the 404 page"
