  # ---------------------------------------------------------------------------
  # FEATURE 14: Security headers
  # ---------------------------------------------------------------------------
  - id: security-headers
    title: "Add security headers for GitHub Pages"
    description: >
      Add security headers to harden the site against common web attacks.
      GitHub Pages supports custom headers via a _headers file (Netlify-style)
      or through <meta http-equiv> tags in HTML. Since GitHub Pages does NOT
      support _headers files, all security headers must be implemented as
      <meta> tags in BaseHead.astro. Headers to add: Content-Security-Policy
      (CSP), X-Content-Type-Options, Referrer-Policy, Permissions-Policy.
      The CSP must whitelist all legitimate external resources (Giscus,
      Umami analytics, Pagefind, Google Fonts if used, etc.) while blocking
      everything else.
    status: backlog
    completion: 0
    difficulty: medium
    priority: medium
    effort: "PT4H"
    started_at: null
    ended_at: null
    constraints:
      - "GitHub Pages does NOT support _headers files — must use <meta> tags"
      - "CSP must whitelist: giscus.app, umami analytics domain, Pagefind JS, any CDN fonts"
      - "Must not break any existing functionality (Giscus comments, analytics, search, View Transitions)"
      - "Must test thoroughly — overly strict CSP can break the entire site"
    forbidden:
      - "Do not use _headers file (not supported by GitHub Pages)"
      - "Do not block inline scripts that are required for theme toggle or View Transitions"
    references:
      - "src/components/BaseHead.astro"
      - "https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP"
      - "https://securityheaders.com/"
    notes:
      - "2026-03-10: Feature added to backlog. GitHub Pages only supports <meta> tags for security headers, not _headers files. CSP via <meta> has limitations (no frame-ancestors, no report-uri) but covers the critical directives."
    subtasks:

