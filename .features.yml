# =============================================================================
# Feature Tracking File - YAML v1.2
# =============================================================================
#
# PURPOSE:
#   Track planned features, their progress, subtasks, and metadata for the
#   Astro-based personal site at fulgidus.github.io.
#
# SCHEMA (for LLM and human consumers):
#
#   Each top-level item under `features` is a feature object with these fields:
#
#   id          : string   - Unique kebab-case identifier for the feature.
#   title       : string   - Human-readable short name.
#   description : string   - Detailed explanation of the feature's goal.
#   status      : enum     - One of: backlog, planned, in_progress, blocked,
#                             in_review, done, cancelled.
#   completion  : integer  - Percentage 0–100. Must be 0 when status is
#                             backlog/planned, 100 when done, and reflect
#                             actual progress otherwise.
#   difficulty  : enum     - One of: trivial, easy, medium, hard, very_hard.
#   priority    : enum     - One of: critical, high, medium, low, wishlist.
#   effort      : string   - Estimated human effort in ISO 8601 duration
#                             (e.g. "PT2H" = 2 hours, "P1D" = 1 day,
#                             "P1DT4H" = 1 day 4 hours).
#   started_at  : string|null - ISO 8601 datetime with timezone when work
#                                began, or null if not yet started.
#   ended_at    : string|null - ISO 8601 datetime with timezone when work
#                                was completed, or null if not yet finished.
#   constraints : list[string] - Technical or process constraints.
#   forbidden   : list[string] - Explicitly forbidden tools, approaches, or
#                                 features (things NOT to do/use).
#   references  : list[string] - URLs or file paths for relevant docs/specs.
#   notes       : list[string] - Free-form status updates, newest first.
#                                 Each entry should be prefixed with an
#                                 ISO 8601 date for chronological tracking.
#   subtasks    : list[subtask] - Ordered breakdown of work. Subtasks use
#                                  the same schema recursively (all fields
#                                  apply, including nested subtasks).
#
# STATUS UPDATE CONVENTION:
#   When updating progress, prepend a new entry to the `notes` list with the
#   current ISO 8601 date and a short description of what changed. Example:
#     - "2026-03-10: Created feature file with initial backlog items."
#   This allows chronological tracking while keeping the latest update first.
#
# COMPLETION RULES:
#   - A parent feature's completion should reflect the weighted average of its
#     subtasks, or be set manually if subtask weights are uneven.
#   - When all subtasks are done, the parent must also be marked done (100%).
#   - If any subtask is blocked, consider whether the parent should be blocked.
#
# SUBTASK NESTING:
#   Subtasks can contain their own subtasks to arbitrary depth. The schema is
#   fully recursive. Deeply nested subtasks should be used sparingly - prefer
#   2–3 levels maximum for readability.
#
# =============================================================================

