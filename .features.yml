  # ---------------------------------------------------------------------------
  # FEATURE 3: Localized 404 page
  # ---------------------------------------------------------------------------
  - id: 404-localized
    title: "Make 404 page localized"
    description: >
      The 404 page is a mock-bash terminal (visitor@fulgidus.github.io:~$)
      that shows the attempted path, a "command not found" error, an `ls`
      of recent posts, and a `cd ~/home` link. It calls getLangFromUrl(Astro.url)
      at build time to resolve the language, but since GitHub Pages serves a
      single static 404.html for ALL missing paths, Astro.url at build time
      has no knowledge of the user's actual requested URL. The result is that
      the page always renders in English regardless of whether the user was
      navigating under /it/. The i18n keys (404.title, 404.terminalError,
      404.terminalHint, 404.terminalHelp, 404.backButtonLabel) already exist
      in en, it, and nl in src/i18n/ui.ts, but they are never activated for
      non-English visitors. Additionally, hardcoded English strings exist in
      the template (e.g. the titlebar text "bash - 404", date formatting
      locale 'en-GB' in toLocaleDateString, the "open" command prefix in the
      inline script). All terminal text — prompts, commands, comments, error
      messages, and the home link — must switch to the detected language.
    status: backlog
    completion: 0
    difficulty: medium
    priority: medium
    effort: "PT6H"
    started_at: null
    ended_at: null
    constraints:
      - "GitHub Pages serves a single 404.html — language detection MUST happen client-side via window.location.pathname"
      - "Must work with the existing i18n system (src/i18n/utils.ts, src/i18n/ui.ts)"
      - "Must support all enabled languages (en, it); extensible to nl"
      - "The 'cd ~/home' link must point to the correct language root (/it/ for Italian, / for English)"
      - "The `ls ./posts/` listing must show posts in the detected language"
      - "Date formatting in the ls listing must use the correct locale (en-GB, it-IT, etc.)"
    forbidden:
      - "Do not require server-side routing (static site on GitHub Pages)"
      - "Do not use JavaScript-based redirects that cause visible page flicker"
      - "Do not embed all language versions of the post list in the HTML — use a data attribute or JSON blob approach"
    references:
      - "src/pages/404.astro"
      - "src/i18n/ui.ts"
      - "src/i18n/utils.ts"
    notes:
      - "2026-03-10: Feature added to backlog. The page is a mock-bash terminal. All 404.* i18n keys already exist in en/it/nl in ui.ts but are never used for non-English visitors because getLangFromUrl runs at build time against a static URL. Hardcoded English: titlebar 'bash - 404', toLocaleDateString('en-GB'), inline script 'open' prefix."
    subtasks:

