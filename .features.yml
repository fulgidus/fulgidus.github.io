      using the site owner's PGP public key before being sent via mailto:.
      The PGP public key (fingerprint: 0A2C0C7981CFA6F32B66BEBC0524FF30B446FFD1,
      identity: Alessio Giulio Corsi <alessio.corsi@gmail.com>) must be
      downloaded from keys.openpgp.org at build time and stored as a .asc
      file in the public/ directory. Client-side encryption uses OpenPGP.js
      (https://openpgpjs.org/). The encrypted message is placed in the
      mailto: body so the user's email client opens with the ciphertext
      ready to send.
