  # ---------------------------------------------------------------------------
  # FEATURE 4: Theme-compliant 404 page
  # ---------------------------------------------------------------------------
  - id: 404-theme-compliant
    title: "Make 404 page theme-compliant"
    description: >
      The 404 page is a mock-bash terminal styled with scoped <style> in
      404.astro. It uses hardcoded hex colors with :global(.dark) and
      :global(:not(.dark)) CSS overrides for theme switching. Despite having
      these dark/light CSS rules, the page currently always renders in light
      theme. The likely cause is that the ThemeToggle.vue component (which
      manages the .dark class on <html> via @vueuse/core useDark()) may not
      properly initialize on the 404 page, or the dark class from localStorage
      is not applied before first paint, causing the :not(.dark) rules to
      always win. The terminal colors (titlebar #2d2d2d/#1e1e1e, body
      #1e1e1e/#f5f5f5, prompt colors, error red, comment green, etc.) need
      to actually respond to the user's theme preference. The ThemeToggle
      must also work interactively on the 404 page so users can switch themes.
    status: backlog
    completion: 0
    difficulty: medium
    priority: medium
    effort: "PT4H"
    started_at: null
    ended_at: null
    constraints:
      - "Must work with the existing UnoCSS dark: variant system and ThemeToggle.vue"
      - "Dark class from localStorage must be applied BEFORE first paint to prevent flash of wrong theme (FOUC)"
      - "Must not break View Transitions when toggling theme on the 404 page"
      - "All terminal colors (titlebar, body, prompt parts, commands, errors, hints, file listings, cursor) must switch correctly"
    forbidden:
      - "Do not remove the mock-bash terminal design — it is a deliberate design choice"
      - "Do not use a separate CSS file for 404 — keep scoped styles in the component"
    references:
      - "src/pages/404.astro"
      - "src/components/ThemeToggle.vue"
      - "uno.config.ts"
    notes:
      - "2026-03-10: Feature added to backlog. The 404 page is a mock-bash terminal with scoped CSS that has :global(.dark) overrides for all elements. Despite this, it always renders light-themed. Root cause likely: .dark class not applied to <html> before first paint on the 404 page. ThemeToggle uses @vueuse/core useDark() which reads localStorage, but this may not run early enough or may not hydrate at all on the 404 page."
    subtasks:

