          present and hydrating on the 404 page? (2) Is BaseLayout.astro
          including the dark mode initialization script? (3) Is the .dark
          class being set on <html> before the 404 styles are evaluated?
          (4) Is there a race condition between Astro hydration and the
          scoped style evaluation?
        status: backlog
        completion: 0
        difficulty: medium
        priority: high
        effort: "PT1H30M"
        started_at: null
        ended_at: null
        constraints:
          - "Must test with both localStorage dark=true and dark=false"
          - "Must test with JS disabled to see server-rendered state"
        forbidden: []
