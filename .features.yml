  # ---------------------------------------------------------------------------
  # FEATURE 1: SplatHash integration for ultrafast TTFF
  # ---------------------------------------------------------------------------
  - id: splathash-integration
    title: "SplatHash integration for ultrafast TTFF"
    description: >
      Integrate SplatHash (https://github.com/junevm/splathash) to generate
      16-byte image hashes that decode in ~0.067ms into 32x32 blurry previews.
      This replaces or supplements any existing image placeholder strategy to
      achieve ultrafast Time To First Frame (TTFF) on all images across the
      site. SplatHash encodes any image into exactly 16 bytes (a 22-char
      base64url string), supports alpha channels, uses perceptual Oklab color
      space, and has bit-exact cross-language parity (Go, TypeScript, Python).
    status: backlog
    completion: 0
    difficulty: hard
    priority: high
    effort: "P2DT4H"
    started_at: null
    ended_at: null
    constraints:
      - "Must not increase bundle size by more than 5KB gzipped for the decoder"
      - "Must work with both light and dark themes"
      - "Hash generation must happen at build time, not runtime"
      - "Must not degrade Lighthouse performance score"
      - "Must handle images with and without alpha channels"
    forbidden:
      - "Do not use BlurHash (inferior decode performance)"
      - "Do not run hash encoding client-side"
      - "Do not store hashes in separate database - embed in markup or frontmatter"
    references:
      - "https://raw.githubusercontent.com/junevm/splathash/refs/heads/main/README.md"
      - "https://github.com/junevm/splathash"
      - "https://junevm.github.io/splathash/"
    notes:
      - "2026-03-10: Feature added to backlog. SplatHash decodes in 0.067ms vs ThumbHash 0.50ms vs BlurHash 6.55ms. Fixed 16-byte output storable as 128-bit integer."
    subtasks:

      - id: splathash-research
        title: "Research and prototype"
        description: >
          Evaluate splathash-ts npm package. Build a standalone prototype that
          encodes a sample image and decodes it in the browser. Measure actual
          decode time and visual quality.
        status: backlog
        completion: 0
        difficulty: easy
        priority: high
        effort: "PT3H"
        started_at: null
        ended_at: null
        constraints:
          - "Use the TypeScript package (splathash-ts) from npm"
        forbidden: []
        references:
          - "https://www.npmjs.com/package/splathash-ts"
        notes: []
        subtasks: []

      - id: splathash-build-pipeline
        title: "Build-time hash generation pipeline"
        description: >
          Create an Astro integration or build script that scans all images
          used in blog posts and pages, generates SplatHash hashes, and stores
          them in a lookup map (JSON or injected into frontmatter). Must run
          during `astro build` and cache results to avoid re-encoding unchanged
          images.
        status: backlog
        completion: 0
        difficulty: hard
        priority: high
        effort: "P1D"
        started_at: null
        ended_at: null
        constraints:
          - "Must be incremental - skip unchanged images"
          - "Must integrate with Astro's build lifecycle"
          - "Cache hash results between builds"
        forbidden:
          - "Do not modify original image files"
          - "Do not use Go or Python encoders - stick to TypeScript for build consistency"
        references: []
        notes: []
        subtasks: []

      - id: splathash-client-decoder
        title: "Client-side decoder component"
        description: >
          Create a Vue or Astro component that reads the SplatHash hash from
          markup, decodes it to a 32x32 canvas on page load, and displays it
          as a placeholder until the full image loads. Must handle the
          crossfade transition from placeholder to full image.
        status: backlog
        completion: 0
        difficulty: medium
        priority: high
        effort: "PT6H"
        started_at: null
        ended_at: null
        constraints:
          - "Placeholder must render before full image request completes"
          - "Must support both <img> and CSS background images"
          - "Transition from placeholder to image must be smooth (CSS fade)"
          - "Must be SSR-compatible - no hydration flash"
        forbidden:
          - "Do not use canvas for the final display - use CSS or inline data URI"
          - "Do not block the main thread during decode"
