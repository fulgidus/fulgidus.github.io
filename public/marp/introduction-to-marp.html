<p>A Marp file is just Markdown with a special frontmatter:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-meta">---</span>
<span class="hljs-attr">marp:</span> <span class="hljs-literal">true</span>
<span class="hljs-attr">theme:</span> <span class="hljs-string">default</span>
<span class="hljs-attr">paginate:</span> <span class="hljs-literal">true</span>
<span class="hljs-meta">---
</span></code></pre>
<p>Each slide is separated by <code>---</code> (horizontal rule).</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="default" data-marpit-pagination="5" style="--paginate:true;--theme:default;" data-marpit-pagination-total="13" data-size="16:9">
<h2 id="text-formatting">Text Formatting</h2>
<p>You can use all standard Markdown:</p>
<ul>
<li><strong>Bold text</strong> and <em>italic text</em></li>
<li><code>inline code</code> and code blocks</li>
<li><a href="https://marp.app">Links</a></li>
<li>Lists (like this one!)</li>
</ul>
<blockquote>
<p>Blockquotes work too, and they look great in presentations.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="default" data-marpit-pagination="6" style="--paginate:true;--theme:default;" data-marpit-pagination-total="13" data-size="16:9">
<h2 id="code-blocks">Code Blocks</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-typescript"><span class="hljs-keyword">function</span> <span class="hljs-title function_">greet</span>(<span class="hljs-params"><span class="hljs-attr">name</span>: <span class="hljs-built_in">string</span></span>): <span class="hljs-built_in">string</span> {
  <span class="hljs-keyword">return</span> <span class="hljs-string">`Hello, <span class="hljs-subst">${name}</span>!`</span>;
}

<span class="hljs-comment">// Marp renders syntax-highlighted code</span>
<span class="hljs-variable language_">console</span>.<span class="hljs-title function_">log</span>(<span class="hljs-title function_">greet</span>(<span class="hljs-string">&quot;TorinoJS&quot;</span>));
</code></pre>
<p>Syntax highlighting is built-in for all major languages.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="default" data-marpit-pagination="7" style="--paginate:true;--theme:default;" data-marpit-pagination-total="13" data-size="16:9">
<h2 id="directives">Directives</h2>
<p>Marp supports <strong>directives</strong> for fine-grained control:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown">&lt;!-- <span class="hljs-emphasis">_backgroundColor: #1e1e1e --&gt;
&lt;!-- _</span>color: white --&gt;
&lt;!-- <span class="hljs-emphasis">_paginate: false --&gt;
</span></code></pre>
<p>Prefixed with <code>_</code> for <strong>local</strong> (current slide only),<br />
or without prefix for <strong>global</strong> (all subsequent slides).</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-background-color="#2d2d2d" data-color="#e0e0e0" data-theme="default" data-marpit-pagination="8" style="--paginate:true;--background-color:#2d2d2d;--color:#e0e0e0;--theme:default;color:#e0e0e0;background-color:#2d2d2d;background-image:none;" data-marpit-pagination-total="13" data-size="16:9">
<h2 id="dark-slide-example">Dark Slide Example</h2>
<p>This slide uses local directives to override the theme:</p>
<ul>
<li>Background: <code>#2d2d2d</code></li>
<li>Text color: <code>#e0e0e0</code></li>
</ul>
<p>Directives give you per-slide customization without leaving Markdown.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="default" data-marpit-pagination="9" style="--paginate:true;--theme:default;" data-marpit-pagination-total="13" data-size="16:9">
<h2 id="images">Images</h2>
<p>Standard Markdown image syntax:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown">![<span class="hljs-string">width:500px</span>](<span class="hljs-link">./image.png</span>)
</code></pre>
<p>Marp adds <strong>image filters</strong>:</p>
<ul>
<li><code>![width:300px]</code> — set width</li>
<li><code>![height:200px]</code> — set height</li>
<li><code>![bg]</code> — background image</li>
<li><code>![bg right:40%]</code> — split layout</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="default" data-marpit-pagination="10" style="--paginate:true;--theme:default;" data-marpit-pagination-total="13" data-size="16:9">

<h2 id="presenter-notes">Presenter Notes</h2>
<p>Add notes that only you can see:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown">&lt;!-- This is a presenter note --&gt;
</code></pre>
<p>Notes appear in presenter view but not in the slides.</p>

<h2 id="export-formats">Export Formats</h2>
<p>Marp can export to multiple formats:</p>
<ul>
<li><img class="emoji" draggable="false" alt="📄" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4c4.svg" data-marp-twemoji=""/> <strong>HTML</strong> — self-contained web page</li>
<li><img class="emoji" draggable="false" alt="📋" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4cb.svg" data-marp-twemoji=""/> <strong>PDF</strong> — for printing and sharing</li>
<li><img class="emoji" draggable="false" alt="📊" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4ca.svg" data-marp-twemoji=""/> <strong>PPTX</strong> — for PowerPoint users</li>
<li><img class="emoji" draggable="false" alt="📝" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4dd.svg" data-marp-twemoji=""/> <strong>Markdown</strong> — the original source</li>
</ul>
<p>All built at compile time, no runtime dependencies.</p>
</section>
